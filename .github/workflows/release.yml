name: Release

on:
  # Fires when the bridge workflow creates a GitHub release (tag v<version>).
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.1.0), without the leading v"
        required: true

permissions:
  contents: read

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Resolve the version from the release tag (v1.2.3 → 1.2.3) or manual input.
      - name: Resolve version
        id: version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION="${RELEASE_TAG#v}"
          fi
          case "$VERSION" in
            [0-9]*.[0-9]*.[0-9]*) ;;
            *) echo "Invalid version: $VERSION" >&2; exit 1 ;;
          esac
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set package versions
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          (cd agnes-library && npm pkg set version="$VERSION")
          (cd agnes-cli && npm pkg set version="$VERSION")

      - name: Typecheck & build agnes-library
        working-directory: agnes-library
        run: |
          bun run typecheck
          bun run build

      - name: Typecheck agnes-cli
        working-directory: agnes-cli
        run: bun run typecheck

      # Publish agnes-library first — agnes-cli depends on it.
      # `bun publish` reads NPM_CONFIG_TOKEN and rewrites `workspace:*` deps to
      # the concrete version.
      - name: Publish agnes-library
        working-directory: agnes-library
        run: bun publish --access public
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish agnes-cli
        working-directory: agnes-cli
        run: bun publish --access public
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
