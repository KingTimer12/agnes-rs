name: CI

on:
  push:
    branches: [main, master]
    paths:
      - "agnes-library/**"
      - "agnes-cli/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "agnes-library/**"
      - "agnes-cli/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/ci.yml"

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: typecheck · build · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # ── agnes-library ──────────────────────────────────────────────
      - name: Typecheck agnes-library
        working-directory: agnes-library
        run: bun run typecheck

      - name: Build agnes-library
        working-directory: agnes-library
        run: bun run build

      - name: Test agnes-library
        working-directory: agnes-library
        run: |
          if find . -path ./node_modules -prune -o -name '*.test.ts' -print | grep -q .; then
            bun test
          else
            echo "no tests — skipping"
          fi

      # ── agnes-cli (depends on the built agnes-library types) ───────
      - name: Typecheck agnes-cli
        working-directory: agnes-cli
        run: bun run typecheck

      - name: Smoke-test agnes-cli
        working-directory: agnes-cli
        run: bun bin/agnes.ts --help

      - name: Test agnes-cli
        working-directory: agnes-cli
        run: |
          if find . -path ./node_modules -prune -o -name '*.test.ts' -print | grep -q .; then
            bun test
          else
            echo "no tests — skipping"
          fi
