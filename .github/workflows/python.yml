name: Python (agnes-py)

on:
  push:
    branches: [main, master]
    tags: ["py-v*"]
    paths:
      - "agnes-py/**"
      - "agnes-core/**"
      - "agnes-cache/**"
      - "agnes-adapter-*/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/python.yml"
  pull_request:
    paths:
      - "agnes-py/**"
      - "agnes-core/**"
      - "agnes-cache/**"
      - "agnes-adapter-*/**"
      - ".github/workflows/python.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: wheels ${{ matrix.platform.os }}-${{ matrix.platform.target }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          # Linux builds cross-compile C (ring's asm) with zig — the container's
          # cross gcc doesn't define __ARM_ARCH, which breaks ring on aarch64.
          - { os: linux, runner: ubuntu-22.04, target: x86_64, manylinux: auto, extra: "--zig" }
          - { os: linux, runner: ubuntu-22.04, target: aarch64, manylinux: auto, extra: "--zig" }
          - { os: macos, runner: macos-15-intel, target: x86_64, manylinux: "off", extra: "" }
          - { os: macos, runner: macos-latest, target: aarch64, manylinux: "off", extra: "" }
          - { os: windows, runner: windows-latest, target: x64, manylinux: "off", extra: "" }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: agnes-py
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter ${{ matrix.platform.extra }}
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          manylinux: ${{ matrix.platform.manylinux }}
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform.os }}-${{ matrix.platform.target }}
          path: agnes-py/dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          working-directory: agnes-py
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: agnes-py/dist

  # Publish to PyPI on a `py-v<version>` tag or manual dispatch.
  release:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/py-v') || github.event_name == 'workflow_dispatch' }}
    needs: [build, sdist]
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Publish
        if: ${{ startsWith(github.ref, 'refs/tags/py-v') }}
        run: uv publish --trusted-publishing always dist/*
