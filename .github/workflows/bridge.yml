name: Bridge (native addon)

on:
  push:
    # Tags trigger the publish job. Tag pushes must NOT be path-filtered
    # (GitHub evaluates `paths` for tags too and would skip the release).
    tags:
      - "v*"
    branches: [main, master]
  pull_request:
    paths:
      - "agnes-bridge/**"
      - "agnes-core/**"
      - "agnes-cache/**"
      - "agnes-adapter-*/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/bridge.yml"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.1.0), without the leading v"
        required: true

concurrency:
  group: bridge-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: -C debuginfo=0
  HUSKY: 0

jobs:
  # ─── Rust tests (all platforms) ───
  test-rust:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: test-${{ matrix.target }}

      - name: Install aarch64-linux cross toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Run tests
        run: cargo test --workspace
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

  # ─── Lint ───
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: lint

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

  # ─── Build native bindings (all platforms) ───
  build-napi:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: napi-${{ matrix.target }}

      - name: Install aarch64-linux cross toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install
        working-directory: agnes-bridge

      - name: Build native module
        run: bun run build --target ${{ matrix.target }}
        working-directory: agnes-bridge
        env:
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CXX_aarch64_unknown_linux_gnu: aarch64-linux-gnu-g++
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binding-${{ matrix.target }}
          path: agnes-bridge/*.node
          if-no-files-found: error

  # ─── Publish to npm (tag or manual dispatch only) ───
  publish:
    runs-on: ubuntu-latest
    needs: [test-rust, lint, build-napi]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment: npm
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install
        working-directory: agnes-bridge

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: agnes-bridge/artifacts

      # Generate the npm/<platform>/ dirs (+ package.json) that `napi artifacts`
      # writes the .node files into. They aren't committed to the repo.
      - name: Create npm platform dirs
        run: bunx napi create-npm-dirs
        working-directory: agnes-bridge

      - name: Move artifacts into npm platform dirs
        run: bun run artifacts
        working-directory: agnes-bridge

      # Version comes from package.json (or the dispatch input, if given).
      # If that version is already on npm, we skip publishing instead of failing —
      # so a normal push to main only publishes when you've bumped the version.
      - name: Resolve version & check npm
        id: version
        working-directory: agnes-bridge
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
            npm pkg set version="$VERSION"
          else
            VERSION="$(node -p "require('./package.json').version")"
          fi
          case "$VERSION" in
            [0-9]*.[0-9]*.[0-9]*) ;;
            *) echo "Invalid version: $VERSION" >&2; exit 1 ;;
          esac
          if npm view "agnes-bridge@$VERSION" version >/dev/null 2>&1; then
            echo "agnes-bridge@$VERSION already published — skipping."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "Will publish agnes-bridge@$VERSION"
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      # Publish the per-platform packages + rewrite optionalDependencies.
      # NO GitHub release here — we create it last, after the main package is
      # fully on npm, so agnes-library/cli only build against a bridge that exists.
      - name: Publish platform packages
        if: steps.version.outputs.publish == 'true'
        working-directory: agnes-bridge
        run: bunx napi pre-publish -t npm --no-gh-release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish main package
        if: steps.version.outputs.publish == 'true'
        working-directory: agnes-bridge
        run: bun publish --access public --ignore-scripts
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Now that agnes-bridge@<version> is on npm, cut the GitHub release.
      # Its `release: published` event triggers the agnes-library / agnes-cli publish.
      - name: Create GitHub release
        if: steps.version.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.value }}
        run: gh release create "v$VERSION" --title "v$VERSION" --notes "Release v$VERSION" --target "$GITHUB_SHA"
